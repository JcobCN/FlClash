name: build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 允许网页端手动触发

env:
  IS_STABLE: ${{ !contains(github.ref, '-') }}

jobs:
  build:
    # if: false  # 暂时禁用原有的全平台编译，仅调试 Linux
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # - platform: android
          #   os: ubuntu-latest
          - platform: windows
            os: Windows-2022
            arch: amd64
          # - platform: macos
          #   os: macos-15-intel
          #   arch: amd64
          # - platform: macos
          #   os: macos-latest
          #   arch: arm64
          # - platform: linux
          #   os: ubuntu-24.04-arm
          #   arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

  # 专门用于编译支持老版本 Linux 的 Job
  build-linux-amd64:
    runs-on: ubuntu-latest
    container:
      image: debian:10
    steps:
      - name: Install build dependencies
        run: |
          echo "deb http://archive.debian.org/debian buster main" > /etc/apt/sources.list
          echo "deb http://archive.debian.org/debian-security buster/updates main" >> /etc/apt/sources.list
          echo 'Acquire::Check-Valid-Until "false";' > /etc/apt/apt.conf.d/99no-check-valid-until
          
          apt-get update
          apt-get install -y curl wget git unzip xz-utils zip libglu1-mesa clang ninja-build pkg-config libgtk-3-dev build-essential jq libkeybinder-3.0-dev libappindicator3-dev file patchelf rpm
          
          wget https://github.com/Kitware/CMake/releases/download/v3.25.3/cmake-3.25.3-linux-x86_64.sh
          chmod +x cmake-3.25.3-linux-x86_64.sh
          ./cmake-3.25.3-linux-x86_64.sh --skip-license --prefix=/usr/local
          
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage --appimage-extract
          mv squashfs-root /opt/appimagetool
          ln -s /opt/appimagetool/AppRun /usr/local/bin/appimagetool

      - name: Fix git safe directory
        run: git config --global --add safe.directory '*'

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true

      - name: Get Flutter Dependency
        run: |
          flutter --version
          flutter pub get

      - name: Setup & Build
        run: dart setup.dart linux --arch amd64 ${{ env.IS_STABLE == 'true' && '--env stable' || '' }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-linux-amd64
          path: ./dist
          overwrite: true

  changelog:
    runs-on: ubuntu-latest
    needs: [ build-linux-amd64 ]
    # 👈 核心修改：只有真正 push tag 时，才去修改和提交 CHANGELOG.md 文件，防止手动触发污染代码库
    if: github.event_name == 'push' && !contains(github.ref, '-')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/heads/main
      - name: Generate
        run: |
          last_ver=$(grep -m1 '^## ' CHANGELOG.md 2>/dev/null | sed 's/^## //')
          tags=($(git tag --merged HEAD --sort=-creatordate))
          temp="NEW_CHANGELOG.md" > "$temp"
          for i in "${!tags[@]}"; do
              curr="${tags[i]}"
              [[ "$curr" == "$last_ver" ]] && break
              prev="${tags[i+1]}"
              range="${prev:+$prev..}$curr"
              echo -e "## $curr\n" >> "$temp"
              git log --no-merges --pretty=format:"%B" "$range" | \
              awk '!/Update changelog/ && NF {print "- " $0 "\n"}' >> "$temp"
          done
          [ -f CHANGELOG.md ] && cat CHANGELOG.md >> "$temp"
          mv "$temp" CHANGELOG.md

      - name: Commit
        run: |
          git add CHANGELOG.md
          if ! git diff --cached --quiet; then
            git config --local user.email "chen08209@gmail.com"
            git config --local user.name "chen08209"
            git commit -m "Update changelog"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload:
    permissions: write-all
    needs: [ build-linux-amd64 ]
    # 👈 取消了环境限制，确保手动触发也能进到这一步
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          pattern: artifact-*
          merge-multiple: true

      - name: Generate release.md
        run: |
          # 👈 核心修改：针对手动触发生成不同的 Release 文本说明
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "这是手动触发的内测构建版本 (基于分支: ${{ github.ref_name }})。" > release.md
            echo "构建时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> release.md
          else
            tags=($(git tag --merged HEAD --sort=-creatordate))
            preTag=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | sed -nE 's/.*"tag_name": "([^"]+)".*/\1/p')
            [ -z "$preTag" ] && preTag=""
            out="release.md" > "$out"
            for i in "${!tags[@]}"; do
              curr="${tags[i]}"
              [[ "$curr" == "$preTag" ]] && break
              prev="${tags[i+1]}"
              range="${prev:+$prev..}$curr"
              git log --no-merges --pretty=format:"%B" "$range" | \
              awk '!/Update changelog/ && NF {print "- " $0 "\n"}' >> "$out"
            done
          fi

      - name: Patch release.md
        if: github.event_name == 'push' # 手动触发不需要合入正式版 template
        run: |
          version=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          if [ -f "./.github/release_template.md" ]; then
            sed "s|VERSION|$version|g" ./.github/release_template.md >> release.md
          fi

      - name: Generate sha256
        run: |
          cd ./dist
          for file in $(find . -type f -not -name "*.sha256"); do
            sha256sum "$file" > "${file}.sha256"
          done  

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          # 👈 核心修改：手动触发时，强制把 tag 和名字设为 "nightly"
          tag_name: ${{ github.event_name == 'workflow_dispatch' && 'nightly' || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && 'Nightly Build (内测版)' || github.ref_name }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
          files: ./dist/*
          body_path: './release.md'
